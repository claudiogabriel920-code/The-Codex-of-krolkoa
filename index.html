<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KROLKOA | THE CODEX</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Cormorant+Garamond:ital,wght@0,300;1,400&display=swap');

        :root { --gold: #c5a059; --bg: #050508; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: #fff; font-family: 'Cormorant Garamond', serif; height: 100vh; overflow: hidden; position: fixed; width: 100%; }
        
        /* Background Espacial */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .container { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }
        
        header { padding-top: 50px; text-align: center; pointer-events: none; }
        h1 { font-family: 'Cinzel'; font-size: 2.2rem; letter-spacing: 12px; color: var(--gold); text-shadow: 0 0 15px rgba(197, 160, 89, 0.4); }

        .app-content { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; }

        /* Painel de Vidro Luxuoso */
        .glass-panel { 
            background: rgba(10, 10, 15, 0.85); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 40px 40px 0 0;
            padding: 30px 25px 40px 25px;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.8);
        }

        input, textarea { 
            width: 100%; background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(197, 160, 89, 0.15); 
            border-radius: 15px; color: #fff; padding: 18px; 
            margin-bottom: 15px; font-size: 1.1rem; outline: none;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--gold); background: rgba(255,255,255,0.06); }

        .btn-forge { 
            background: linear-gradient(135deg, #600, #b00); 
            color: #fff; border: none; padding: 20px; border-radius: 18px; 
            width: 100%; font-family: 'Cinzel'; font-weight: 900; 
            letter-spacing: 4px; font-size: 1rem; cursor: pointer;
            box-shadow: 0 8px 25px rgba(139, 0, 0, 0.5);
        }
        .btn-forge:active { transform: scale(0.97); opacity: 0.9; }

        /* Botão de Audio */
        .audio-btn { 
            position: fixed; top: 25px; right: 25px; z-index: 100;
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(0,0,0,0.5); border: 1px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            color: var(--gold); font-size: 1.2rem;
        }

        .log-area { margin-top: 20px; max-height: 150px; overflow-y: auto; }
        .entry { border-left: 2px solid var(--gold); padding: 10px 15px; margin-bottom: 10px; background: rgba(255,255,255,0.02); border-radius: 0 10px 10px 0; }
        .entry h4 { font-family: 'Cinzel'; color: var(--gold); font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="audio-btn" onclick="toggleMusic()" id="mBtn">🔇</div>
<canvas id="canvas"></canvas>

<audio id="bgMusic" loop>
    <source src="https://www.myinstants.com/media/sounds/c418-mice-on-venus-doomer-version.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <header><h1>KROLKOA</h1></header>
    <div class="app-content">
        <div class="glass-panel">
            <input type="text" id="title" placeholder="Título da Lore..." oninput="clickSound()">
            <textarea id="lore" rows="3" placeholder="O Codex aguarda o seu relato..." oninput="clickSound()"></textarea>
            <button class="btn-forge" onclick="forge()">FORJAR NO CODEX</button>
            <div id="log" class="log-area"></div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const music = document.getElementById('bgMusic');
    let w, h, time = 0, pulse = 0;

    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function toggleMusic() {
        if(music.paused) { music.play(); document.getElementById('mBtn').innerText = '🔊'; }
        else { music.pause(); document.getElementById('mBtn').innerText = '🔇'; }
    }

    function clickSound() {
        const a = new AudioContext(); const o = a.createOscillator(); const g = a.createGain();
        o.type = 'sine'; o.frequency.value = 400 + Math.random()*200;
        g.gain.setValueAtTime(0.01, a.currentTime); g.gain.linearRampToValueAtTime(0, a.currentTime + 0.05);
        o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime + 0.05);
    }

    function draw() {
        ctx.fillStyle = '#050508'; ctx.fillRect(0,0,w,h);
        time += 0.005; if(pulse > 0) pulse *= 0.9;
        const cx = w/2, cy = h*0.35, r = 85 + pulse;

        // Estrelas de Fundo
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        for(let i=0; i<60; i++) {
            let x = (Math.cos(i)*w*2 + time*20) % w;
            let y = (Math.sin(i)*h*2) % h;
            ctx.fillRect(x, y, 1, 1);
        }

        // Brilho Atmosférico (Shaders manuais)
        const glow = ctx.createRadialGradient(cx, cy, r, cx, cy, r+60);
        glow.addColorStop(0, 'rgba(60, 100, 200, 0.4)');
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(cx,cy,r+60,0,Math.PI*2); ctx.fill();

        // O Planeta
        ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
        // Oceano
        ctx.fillStyle = '#0a1a3a'; ctx.fill();
        // Continentes
        ctx.fillStyle = '#1a3a1a';
        for(let i=0; i<6; i++) {
            let xOff = Math.sin(time + i) * 50;
            ctx.beginPath(); ctx.arc(cx + xOff + (i*30-90), cy + (Math.cos(i)*20), r*0.5, 0, Math.PI*2); ctx.fill();
        }
        // Sombra (Deep Space Shadow)
        const shadow = ctx.createRadialGradient(cx - r*0.4, cy - r*0.4, r*0.1, cx, cy, r);
        shadow.addColorStop(0, 'transparent'); shadow.addColorStop(1, 'rgba(0,0,0,0.8)');
        ctx.fillStyle = shadow; ctx.fillRect(cx-r, cy-r, r*2, r*2);
        ctx.restore();

        // Luas Gêmeas
        for(let i=0; i<2; i++) {
            let s = time * (i === 0 ? 1 : -0.7);
            let dist = r + 50 + (i*30);
            let lx = cx + Math.cos(s) * dist;
            let ly = cy + Math.sin(s) * 25;
            ctx.fillStyle = i === 0 ? '#fff' : '#444';
            ctx.beginPath(); ctx.arc(lx, ly, i===0?5:3, 0, Math.PI*2); ctx.fill();
            // Brilho da lua
            ctx.shadowBlur = 10; ctx.shadowColor = "#fff"; ctx.fill(); ctx.shadowBlur = 0;
        }

        requestAnimationFrame(draw);
    }
    draw();

    function forge() {
        const t = document.getElementById('title').value;
        const l = document.getElementById('lore').value;
        if(!t || !l) return;
        pulse = 50;
        const log = document.getElementById('log');
        log.innerHTML = `<div class="entry"><h4>${t}</h4><p>${l}</p></div>` + log.innerHTML;
        
        // Efeito de som de forja
        const a = new AudioContext(); const o = a.createOscillator(); const g = a.createGain();
        o.frequency.setValueAtTime(100, a.currentTime); o.frequency.exponentialRampToValueAtTime(0.01, a.currentTime + 1);
        g.gain.setValueAtTime(0.2, a.currentTime); g.gain.linearRampToValueAtTime(0, a.currentTime + 1);
        o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime + 1);

        // Download do arquivo
        const blob = new Blob([`CODEX KROLKOA\n\nTITULO: ${t}\nRELATO: ${l}`], {type:'text/plain'});
        const link = document.createElement('a'); link.href = URL.createObjectURL(blob);
        link.download = `${t}.txt`; link.click();
    }
</script>
</body>
</html>
